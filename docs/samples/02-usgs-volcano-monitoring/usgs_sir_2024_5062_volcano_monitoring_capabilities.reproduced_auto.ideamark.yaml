entities:
  IE-USGS-CITATION:
    kind: context
    payload:
      body: Chapter I Monitoring Marine Eruptions by Gabrielle Tepp in USGS SIR 2024-5062, linked to report page, chapter PDF, and DOI references.
      format:
        media_type: text/plain
  IE-USGS-CONTEXT-CHALLENGES:
    kind: context
    payload:
      body: Submarine monitoring is constrained by marine deployment and telemetry conditions, reducing continuous observability.
      format:
        media_type: text/plain
  IE-USGS-CONTEXT-HAZARDS:
    kind: risk
    payload:
      body: Submarine eruptions may produce hazardous impacts including large plumes and marine disruptions.
      format:
        media_type: text/plain
  IE-USGS-INST-CORE-SENSORS:
    kind: solution
    payload:
      body: Core instrumentation includes ocean-bottom pressure sensors, OBS, and hydrophones.
      format:
        media_type: text/plain
  IE-USGS-INST-EMERGING-OPTIONS:
    kind: structural_hypothesis
    payload:
      body: Emerging methods may improve future submarine monitoring coverage.
      format:
        media_type: text/plain
  IE-USGS-INST-TELEMETRY-CONSTRAINTS:
    kind: constraint
    payload:
      body: Real-time marine telemetry is often constrained by cost and technical limits.
      format:
        media_type: text/plain
  IE-USGS-REF-CHAPTER-PDF:
    kind: evidence
    payload:
      body: "USGS chapter PDF: https://pubs.usgs.gov/sir/2024/5062/i/sir20245062i.pdf"
      format:
        media_type: text/plain
  IE-USGS-REF-DOI:
    kind: evidence
    payload:
      body: "USGS chapter DOI: https://doi.org/10.3133/sir20245062I"
      format:
        media_type: text/plain
  IE-USGS-REF-REPORT-PAGE:
    kind: evidence
    payload:
      body: "USGS report page: https://pubs.usgs.gov/sir/2024/5062/"
      format:
        media_type: text/plain
  IE-USGS-REGIONAL-NETWORKS:
    kind: solution
    payload:
      body: Regional monitoring uses hydrophone arrays and seismic networks, including T-phase-sensitive configurations.
      format:
        media_type: text/plain
  IE-USGS-REGIONAL-REMOTE-SENSING:
    kind: solution
    payload:
      body: Satellite and aerial sensing provide complementary detection of surficial eruption indicators.
      format:
        media_type: text/plain
  IE-USGS-REGIONAL-TPHASE:
    kind: mechanism
    payload:
      body: Hydroacoustic T-phases support long-distance detection of submarine volcanic activity.
      format:
        media_type: text/plain
  IE-USGS-SOURCE-TEXT:
    kind: evidence
    payload:
      body: Extracted text from USGS SIR 2024-5062 Chapter I source materials.
      format:
        media_type: text/plain
