doc_id: DOC-USGS-SIR-2024-5062-I-REPRO-001
doc_type: derived
entities:
  IE-USGS-CITATION:
    kind: context
    payload:
      body: Chapter I Monitoring Marine Eruptions by Gabrielle Tepp in USGS Scientific Investigations Report 2024-5062, with chapter citation and DOI references in source front matter.
      format:
        media_type: text/plain
  IE-USGS-CONTEXT-CHALLENGES:
    kind: context
    payload:
      body: Submarine volcano monitoring faces distinct marine-environment constraints that reduce continuous observation and can delay eruption recognition.
      format:
        media_type: text/plain
  IE-USGS-CONTEXT-HAZARDS:
    kind: risk
    payload:
      body: Submarine eruptions can create substantial hazards including major plumes, marine disruption, and regionally significant impacts.
      format:
        media_type: text/plain
  IE-USGS-INST-CORE-SENSORS:
    kind: solution
    payload:
      body: Core marine monitoring includes ocean-bottom pressure, ocean-bottom seismometers, and hydrophones, with optional chemistry/temperature/turbidity support sensors.
      format:
        media_type: text/plain
  IE-USGS-INST-EMERGING-OPTIONS:
    kind: structural_hypothesis
    payload:
      body: Emerging marine monitoring approaches, including autonomous and fiber-optic methods, may improve future coverage.
      format:
        media_type: text/plain
  IE-USGS-INST-TELEMETRY-CONSTRAINTS:
    kind: constraint
    payload:
      body: Real-time marine telemetry can be technically feasible but is often constrained by cost and deployment complexity.
      format:
        media_type: text/plain
  IE-USGS-REF-CHAPTER-PDF:
    kind: evidence
    payload:
      body: "USGS chapter PDF: https://pubs.usgs.gov/sir/2024/5062/i/sir20245062i.pdf"
      format:
        media_type: text/plain
  IE-USGS-REF-DOI:
    kind: evidence
    payload:
      body: "USGS chapter DOI: https://doi.org/10.3133/sir20245062I"
      format:
        media_type: text/plain
  IE-USGS-REF-REPORT-PAGE:
    kind: evidence
    payload:
      body: "USGS report page: https://pubs.usgs.gov/sir/2024/5062/"
      format:
        media_type: text/plain
  IE-USGS-REGIONAL-NETWORKS:
    kind: solution
    payload:
      body: Regional detection uses hydrophone arrays and seismic networks, including systems optimized for T-phase sensing.
      format:
        media_type: text/plain
  IE-USGS-REGIONAL-REMOTE-SENSING:
    kind: solution
    payload:
      body: Satellite and aerial observations complement instrument networks by identifying surficial eruption indicators.
      format:
        media_type: text/plain
  IE-USGS-REGIONAL-TPHASE:
    kind: mechanism
    payload:
      body: Hydroacoustic T-phase propagation enables long-range detection of submarine volcanic activity in ocean basins.
      format:
        media_type: text/plain
  IE-USGS-SOURCE-TEXT:
    kind: evidence
    payload:
      body: Extracted text from USGS SIR 2024-5062 Chapter I PDF and metadata section.
      format:
        media_type: text/plain
