entities:
  IE-USGS-CONTEXT-CHALLENGES:
    kind: "context"
    payload:
      body: "Submarine volcano monitoring faces distinct marine-environment constraints that reduce continuous observation and can delay eruption recognition."
      format:
        media_type: "text/plain"
    atomicity_basis: "interpretive"
  IE-USGS-CONTEXT-HAZARDS:
    kind: "risk"
    payload:
      body: "Submarine eruptions can create substantial hazards including major plumes, marine disruption, and regionally significant impacts."
      format:
        media_type: "text/plain"
    atomicity_basis: "interpretive"
  IE-USGS-REGIONAL-TPHASE:
    kind: "mechanism"
    payload:
      body: "Hydroacoustic T-phase propagation enables long-range detection of submarine volcanic activity in ocean basins."
      format:
        media_type: "text/plain"
    atomicity_basis: "interpretive"
  IE-USGS-REGIONAL-NETWORKS:
    kind: "solution"
    payload:
      body: "Regional detection uses hydrophone arrays and seismic networks, including systems optimized for T-phase sensing."
      format:
        media_type: "text/plain"
    atomicity_basis: "interpretive"
  IE-USGS-REGIONAL-REMOTE-SENSING:
    kind: "solution"
    payload:
      body: "Satellite and aerial observations complement instrument networks by identifying surficial eruption indicators."
      format:
        media_type: "text/plain"
    atomicity_basis: "interpretive"
  IE-USGS-INST-CORE-SENSORS:
    kind: "solution"
    payload:
      body: "Core marine monitoring includes ocean-bottom pressure, ocean-bottom seismometers, and hydrophones, with optional chemistry, temperature, and turbidity support sensors."
      format:
        media_type: "text/plain"
    atomicity_basis: "interpretive"
  IE-USGS-INST-TELEMETRY-CONSTRAINTS:
    kind: "constraint"
    payload:
      body: "Real-time marine telemetry can be technically feasible but is often constrained by cost and deployment complexity."
      format:
        media_type: "text/plain"
    atomicity_basis: "interpretive"
  IE-USGS-INST-EMERGING-OPTIONS:
    kind: "observation"
    payload:
      body: "Hydrophone-equipped gliders, autonomous floats, and fiber-optic sensing are candidate future enhancements for submarine monitoring."
      format:
        media_type: "text/plain"
    atomicity_basis: "interpretive"
  IE-USGS-REF-REPORT-PAGE:
    kind: "evidence"
