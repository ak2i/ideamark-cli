entities:
  IE-NASA-ADS-PROBLEM:
    kind: "observation"
    payload:
      body: "Complex schematic and block diagrams were manually drafted from freehand design sketches, taking about 12 to 15 hours per complex diagram."
      format:
        media_type: "text/plain"
    atomicity_basis: "interpretive"
  IE-NASA-ADS-SOLUTION:
    kind: "solution"
    payload:
      body: "An automated drafting system encoded conventional symbols and coordinates and drove a high-speed photocomposition machine."
      format:
        media_type: "text/plain"
    atomicity_basis: "interpretive"
  IE-NASA-ADS-PROCESS:
    kind: "mechanism"
    payload:
      body: "Marked sketch codes were translated to machine language, converted to raw tape, expanded by computer, then punched into output tape for photocomposition control."
      format:
        media_type: "text/plain"
    atomicity_basis: "interpretive"
  IE-NASA-ADS-OUTCOME:
    kind: "outcome"
    payload:
      body: "Complex diagrams were produced in about 3 to 4 hours, and one program projected savings above $140,000 over approximately 6,600 D-size drawings."
      format:
        media_type: "text/plain"
    atomicity_basis: "interpretive"
  IE-NASA-ADS-PROVENANCE:
    kind: "context"
    payload:
      body: "Source attribution includes Donald H. Millenson, NASA Tech Brief 66-10362 (MFS-788), and Marshall Space Flight Center contract context."
