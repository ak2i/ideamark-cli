created_at: "2026-06-19T00:00:00Z"
updated_at: "2026-06-19T00:00:00Z"
lang: "ja-JP"
title: "RFC 3986 URI Overview Sample"
summary: "RFC 3986 Section 1.1 の URI 概要を再構成したサンプル文書。"
entities:
  IE-URI:
    kind: "concept"
    atomicity_basis: "interpretive"
    payload:
      body: "URIは資源を識別するためのコンパクトな文字列であり、文書、サービス、概念、人、組織など広範な対象を識別できる。"
      format:
        media_type: "text/plain"
  IE-UNIFORM:
    kind: "concept"
    atomicity_basis: "interpretive"
    payload:
      body: "uniformとは、異なる識別子方式を共通の構文枠組みで扱えることを意味する。"
      format:
        media_type: "text/plain"
  IE-RESOURCE:
    kind: "concept"
    atomicity_basis: "interpretive"
    payload:
      body: "resourceとは識別対象そのものであり、抽象的な対象や時間変化する対象も含まれる。"
      format:
        media_type: "text/plain"
  IE-IDENTIFIER:
    kind: "concept"
    atomicity_basis: "interpretive"
    payload:
      body: "identifierとは一定の範囲で他の資源と区別するための情報であり、識別はアクセスを意味しない。"
      format:
        media_type: "text/plain"
  IE-SCHEME:
    kind: "concept"
    atomicity_basis: "structural"
    payload:
      body: "URIはhttp、mailto、ftp、file、urnなどのschemeによって解釈される。"
      format:
        media_type: "text/plain"
  IE-GENERIC-SYNTAX:
    kind: "concept"
    atomicity_basis: "structural"
    payload:
      body: "RFC 3986はURI scheme間で共有される汎用構文を定義し、共通解析とscheme固有解釈を分離する。"
      format:
        media_type: "text/plain"
  IE-URL-URN:
    kind: "concept"
    atomicity_basis: "interpretive"
    payload:
      body: "URLは主に資源の所在やアクセス方法を示すURI、URNは永続的名称を示すURIとして理解されるが、厳密な二分法ではない。"
      format:
        media_type: "text/plain"
  IE-SOURCE:
    kind: "source"
    atomicity_basis: "lexical"
    payload:
      ref:
        uri: "https://datatracker.ietf.org/doc/html/rfc3986"
      format:
        media_type: "text/html"
